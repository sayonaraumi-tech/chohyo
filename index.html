<head>

<title>月輪合同会社 経理システム</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", "Noto Sans CJK JP", sans-serif;
  background: #f0f2f5; color: #1a1a1a; -webkit-text-size-adjust: 100%;
}

/* ==================== Editor ==================== */
.editor { max-width: 720px; margin: 0 auto; padding: 16px; }
.editor-card {
  background: #fff; padding: 20px; border-radius: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-bottom: 14px;
}
.editor h2 { font-size: 18px; margin-bottom: 4px; }
.editor .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }
.editor h3 { font-size: 13px; margin: 0 0 10px; color: #555; font-weight: 600; }

/* Tab 切换 */
.tabs {
  display: flex; gap: 6px; margin: 12px 0 16px;
  background: #f1f3f5; padding: 4px; border-radius: 10px;
}
.tab {
  flex: 1; padding: 11px 8px; border: none; background: transparent;
  border-radius: 7px; cursor: pointer; font-size: 14px; font-weight: 600;
  color: #777; font-family: inherit; transition: all .15s;
  -webkit-appearance: none;
}
.tab.active {
  background: linear-gradient(135deg, #d4b574, #9c7a2e);
  color: #fff;
  box-shadow: 0 2px 8px rgba(156,122,46,.3);
}

.form-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.form-group { flex: 1; min-width: 140px; }
.form-group.full { flex-basis: 100%; }
.form-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #666; font-weight: 500; }
.form-group input, .form-group textarea {
  width: 100%; padding: 11px 12px; border: 1px solid #e0e3e8;
  border-radius: 8px; font-size: 15px; font-family: inherit;
  background: #fafbfc; -webkit-appearance: none;
}
.form-group input:focus, .form-group textarea:focus { outline: none; border-color: #c9a961; background: #fff; }
.item-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
.item-row input {
  padding: 10px; border: 1px solid #e0e3e8; border-radius: 7px;
  font-size: 14px; background: #fafbfc; min-width: 0; -webkit-appearance: none;
}
.item-content { flex: 2.2; } .item-qty, .item-price { flex: 1; }
.item-remove {
  background: #f1f3f5; color: #e74c3c; border: none;
  width: 36px; height: 40px; border-radius: 7px; cursor: pointer;
  font-size: 20px; flex-shrink: 0; font-weight: 600;
}
.btn-add {
  background: #f1f3f5; color: #3498db; border: 1px dashed #c0d3e0;
  padding: 10px; border-radius: 8px; cursor: pointer;
  font-size: 14px; width: 100%; margin-top: 4px; font-weight: 500;
}
.btn-print {
  background: linear-gradient(135deg, #d4b574, #9c7a2e);
  color: #fff; border: none; padding: 16px 30px;
  border-radius: 12px; cursor: pointer; font-size: 16px;
  font-weight: 700; width: 100%;
  box-shadow: 0 4px 14px rgba(156,122,46,.35); letter-spacing: 1px;
  -webkit-tap-highlight-color: rgba(255,255,255,0.3);
  touch-action: manipulation;
}
.btn-print:active { transform: translateY(1px); filter: brightness(1.1); }
.btn-download {
  background: #fff; color: #1a1a1a;
  border: 2px solid #c9a961;
  padding: 14px 20px; border-radius: 10px;
  cursor: pointer; font-size: 13px;
  font-weight: 600; width: 100%; margin-top: 10px;
  letter-spacing: 0.5px;
  -webkit-tap-highlight-color: rgba(201,169,97,0.3);
  touch-action: manipulation;
}
.btn-download:active { transform: translateY(1px); background: #fbf3df; }
.btn-preview {
  background: #fff; color: #555; border: 1px solid #d8dde3;
  padding: 12px; border-radius: 10px; cursor: pointer;
  font-size: 14px; width: 100%; margin-bottom: 10px; font-weight: 500;
}
.tip { font-size: 12px; color: #888; text-align: center; margin-top: 10px; line-height: 1.6; }


/* ==================== Invoice (Classic 原版风格) ==================== */
.invoice-wrapper {
  display: none; padding: 28px 16px;
  background: linear-gradient(180deg, #e9ecef 0%, #f4f6f8 100%);
  overflow-x: auto;
}
.invoice-wrapper.show { display: flex; justify-content: center; }

.invoice {
  --dens: 1; /* 内容密度系数：打印/导出时 JS 自动微调，把内容收进单页 */
  width: 210mm; min-height: 297mm; background: #fff;
  box-shadow: 0 4px 24px rgba(0,0,0,.15);
  color: #1a1a1a; position: relative; flex-shrink: 0;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif CJK JP", "MS Mincho", serif;
  padding: 14mm 16mm 12mm;
  box-sizing: border-box;
}
/* 領収書：A4 縦向（按图片格式） */
.invoice.receipt-mode {
  min-height: 297mm;
  height: 297mm;
}

/* ===== 顶部：左大logo+月輪合同会社 / 右大字抬头 ===== */
.hdr-classic {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: calc(8mm * var(--dens));
}
.hdr-left {
  display: flex; align-items: center; gap: 4mm;
}
.logo-big {
  width: 28mm; height: auto; flex-shrink: 0;
}
.hdr-brand {
  display: flex; flex-direction: column;
}
.brand-jp-big {
  font-size: 26pt; font-weight: 700;
  letter-spacing: 4px; color: #1a1a1a;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
}
.brand-en-classic {
  font-size: 8pt; letter-spacing: 6px; color: #a08344;
  margin-top: 2px; text-align: center;
  font-family: "Helvetica Neue", Arial, sans-serif;
}
